{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="flash-stack" style="position:fixed; top:18px; right:18px; z-index:10001; display:flex; flex-direction:column; gap:10px; max-width:340px;">
    {% for category, message in messages %}
    <div class="cs-alert {{ 'error' if category=='error' else ('warn' if category=='warn' else '') }} fade-in-up" style="background: var(--cs-bg-card);">
        <span>{{ message }}</span>
    </div>
    {% endfor %}
</div>
<script>
setTimeout(function(){
    var stack = document.querySelector('.flash-stack');
    if (stack) { stack.style.transition = 'opacity .6s'; stack.style.opacity = '0'; setTimeout(function(){ stack.remove(); }, 600); }
}, 4200);
</script>
{% endif %}
{% endwith %}
