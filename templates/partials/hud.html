{# CYBER SHATS — Minimal HUD (4 burchak, kichik va xalaqit bermaydi) #}
<div class="hud-overlay hud-minimal">
    <div class="hud-tl">
        <div class="hud-line">IP: <span class="green">{{ hud_ip }}</span></div>
        <div class="hud-line">HOLAT: <span class="dot-live"></span> <span class="green">ONLINE</span></div>
    </div>
    <div class="hud-tr">
        <div class="hud-line">THREAT: <span class="green">LOW</span></div>
        <div class="hud-line">FIREWALL: <span class="green">FAOL</span></div>
    </div>
    <div class="hud-bl">
        <div class="hud-line" id="hud-online" data-base="{{ hud_online }}">{{ hud_online }} online</div>
        <div class="hud-line">BUGUN: <span class="green">+{{ hud_today }}</span></div>
    </div>
    <div class="hud-br">
        <div class="hud-line" id="hud-time">--:--:--</div>
        <div class="hud-line" id="hud-uptime">UPTIME: {{ uptime_days }}D</div>
    </div>
</div>
