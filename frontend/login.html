<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHATS.KIBER — Kirish</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#00ff41;--red:#ff0033;--gold:#ffd700;--bg:#0a0a0a;--card:#111;--border:#1a1a1a}
body{background:var(--bg);color:var(--green);font-family:'Fira Code',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:0;opacity:.4}
.container{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{font-size:48px;margin-bottom:8px}
.logo h1{font-size:28px;font-weight:700;letter-spacing:4px;color:var(--green);text-shadow:0 0 20px var(--green)}
.logo p{font-size:12px;color:#555;letter-spacing:2px;margin-top:4px}
.card{background:rgba(0,255,65,.03);border:1px solid rgba(0,255,65,.15);border-radius:12px;padding:32px;backdrop-filter:blur(10px)}
.card h2{font-size:16px;color:var(--green);margin-bottom:24px;display:flex;align-items:center;gap:8px}
.card h2::before{content:'>';color:var(--green)}
label{display:block;font-size:11px;color:#555;letter-spacing:1px;margin-bottom:6px;margin-top:16px}
input{width:100%;background:rgba(0,255,65,.04);border:1px solid rgba(0,255,65,.2);border-radius:6px;padding:12px 14px;color:var(--green);font-family:'Fira Code',monospace;font-size:14px;outline:none;transition:.2s}
input:focus{border-color:var(--green);box-shadow:0 0 12px rgba(0,255,65,.15)}
input::placeholder{color:#333}
.btn{width:100%;margin-top:24px;padding:14px;background:var(--green);color:#0a0a0a;border:none;border-radius:6px;font-family:'Fira Code',monospace;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:.2s}
.btn:hover{background:#00cc33;box-shadow:0 0 20px rgba(0,255,65,.4)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.link{text-align:center;margin-top:20px;font-size:12px}
.link a{color:var(--green);text-decoration:none;opacity:.7}
.link a:hover{opacity:1}
.error{background:rgba(255,0,51,.1);border:1px solid var(--red);border-radius:6px;padding:12px;margin-top:16px;font-size:12px;color:var(--red);display:none}
.blocked{background:rgba(255,0,51,.15);border:1px solid var(--red);border-radius:6px;padding:16px;margin-top:16px;display:none}
.blocked h3{color:var(--red);font-size:14px;margin-bottom:8px}
.blocked p{font-size:11px;color:#ccc;line-height:1.6}
.pay-btn{margin-top:12px;padding:10px 20px;background:transparent;border:1px solid var(--gold);color:var(--gold);border-radius:6px;font-family:'Fira Code',monospace;font-size:12px;cursor:pointer;width:100%}
.status-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:11px;color:#333;letter-spacing:1px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
</style>
</head>
<body>
<canvas id="matrix"></canvas>

<div class="container">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <h1>SHATS.KIBER</h1>
    <p>O'rgan • Amaliyot Qil • Professional Bo'l</p>
  </div>

  <div class="card">
    <h2>Tizimga kirish</h2>
    <label>LOGIN</label>
    <input type="text" id="username" placeholder="username_001" autocomplete="off">
    <label>PAROL</label>
    <input type="password" id="password" placeholder="••••••••••••">
    
    <div class="error" id="error-box"></div>
    <div class="blocked" id="blocked-box">
      <h3>🔴 IP BLOKLANDI!</h3>
      <p>Siz 3 marta noto'g'ri parol kiritdingiz.<br>IP manzilingiz bloklandi.<br>Blokdan chiqarish uchun <strong style="color:var(--gold)">100,000 so'm</strong> to'lashingiz kerak.</p>
      <button class="pay-btn" onclick="showPayment('unblock')">💳 Click orqali to'lash</button>
      <button class="pay-btn" style="margin-top:8px" onclick="showPayment('payme')">💳 Payme orqali to'lash</button>
    </div>
    
    <button class="btn" id="loginBtn" onclick="doLogin()">[ KIRISH ]</button>
    <div class="link">
      <a href="/register.html">Ro'yxatdan o'tish →</a>
    </div>
  </div>
</div>

<div class="status-bar"><span class="dot"></span>SHATS.KIBER v1.0 | Xavfsiz ulanish</div>

<script>
// Matrix animatsiya
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const chars = '01アイウエオカキクケコシーSHATSCYBER';
const cols = Math.floor(canvas.width/16);
const drops = Array(cols).fill(1);
function drawMatrix(){
  ctx.fillStyle='rgba(0,0,0,0.05)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#00ff41';
  ctx.font='14px Fira Code';
  drops.forEach((y,i)=>{
    ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*16,y*16);
    if(y*16>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  });
}
setInterval(drawMatrix,50);

// Login (sessionStorage ishlatiladi — xavfsizroq)
async function doLogin(){
  const btn = document.getElementById('loginBtn');
  const username = document.getElementById('username').value.trim().slice(0,64);
  const password = document.getElementById('password').value;

  if(!username || !password){
    showError('Login va parol kiriting!');
    return;
  }

  btn.disabled = true;
  btn.textContent = '[ TEKSHIRILMOQDA... ]';
  document.getElementById('error-box').style.display='none';
  document.getElementById('blocked-box').style.display='none';

  try{
    const res = await fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username, password})
    });
    const data = await res.json();

    if(res.ok){
      // sessionStorage: brauzer yopilganda tozalanadi (localStorage dan xavfsizroq)
      sessionStorage.setItem('shats_token', data.token);
      sessionStorage.setItem('shats_user', JSON.stringify(data.user));

      const role = data.user?.role;
      if(role==='superadmin'||role==='admin'||role==='moderator'){
        window.location.href='/admin.html';
      } else {
        window.location.href='/dashboard.html';
      }
    } else {
      if(data.blocked){
        document.getElementById('blocked-box').style.display='block';
      } else {
        showError(data.error || "Login yoki parol noto'g'ri");
      }
    }
  } catch(e){
    showError('Server bilan ulanishda xato!');
  }

  btn.disabled=false;
  btn.textContent='[ KIRISH ]';
}

function showError(msg){
  const el = document.getElementById('error-box');
  el.textContent = '⚠ ' + msg;
  el.style.display='block';
}

function showPayment(type){
  const amount = 100000;
  if(type==='unblock'){
    window.open(`https://my.click.uz/services/pay/?service_id=SHATS&amount=${amount}&comment=unblock_ip`,'_blank');
  } else {
    window.open(`https://checkout.paycom.uz/SHATS_unblock_${amount}`,'_blank');
  }
}

// Enter tugmasi
document.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

// Agar sessiya bor bo'lsa, yo'naltirish
const _existingToken = sessionStorage.getItem('shats_token');
if(_existingToken){
  const _u = JSON.parse(sessionStorage.getItem('shats_user')||'{}');
  if(_u.role==='admin'||_u.role==='superadmin'||_u.role==='moderator')
    window.location.href='/admin.html';
  else
    window.location.href='/dashboard.html';
}
</script>
</body>
</html>
